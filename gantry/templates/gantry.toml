# gantry.toml — Gantry pipeline configuration for this repo.
# Pipeline: spec -> design -> plan -> build -> evidence -> review
# Everything project-specific lives here; the Gantry engine hardcodes nothing.

project_id = "my-project"

# Which stages run, in order. Default starts at "plan" (write your spec/design
# framing directly into `gantry run --request`) so existing runs keep today's
# behavior. Uncomment the line below for the full autonomous pipeline — a
# fresh run then starts at awaiting_spec, produces product-spec.md and
# architecture-design.md as real agent-authored artifacts (see
# .gantry/prompts/spec.md, design.md), and pauses at each for human
# `gantry approve`/`gantry revise` UNLESS [git].auto_approve_docs = true below.
stages = ["plan", "build", "evidence", "review"]
# stages = ["spec", "design", "plan", "build", "evidence", "review"]

# Where stage prompt templates live (relative to this file, or absolute).
prompts_dir = ".gantry/prompts"

# Gantry ships 5 fixed, generic Linear-intake queues out of the box (see
# gantry/linear.py's classifier tags: feature/bug/hotfix/research/chore) —
# each with its own default stage list, no config needed here to get them.
# [queues.<tag>] only exists to OVERRIDE one queue's stages for this project;
# any tag left unset keeps gantry's built-in default for that tag.
# [queues.bug]
# stages = ["investigation", "plan", "build", "evidence", "review"]

[agent]
# Which agent backend drives plan/build/evidence.
# "cursor-sdk" (default) | "claude-code" | "cursor-cli" | "codex-cli"
# Legacy CLI runners remain supported. cursor-sdk is non-TUI, so cockpit uses
# cursor-cli for its interactive pane when this backend is selected.
runner = "cursor-sdk"
skip_permissions = true      # pass the runner's headless auto-approve flag
output_format = "json"
# Cap on concurrently-running agent subprocesses across `advance --all`'s
# per-tick sweep. 0 (default) = stay serial, today's behavior — set >= 2 to
# let independent runs' build/plan/evidence stages execute in parallel.
max_concurrent = 0

# Per-stage model selection. Leave model = "" to use the runner's default.
[models.plan]
model = ""
max_turns = 40
plan_mode = true

[models.build]
model = ""
max_turns = 80

[models.evidence]
model = ""
max_turns = 120

# Uncomment to use a stronger/different model specifically for the resolver
# stage (auto_resolve below) — falls back to [models.build] if unset. Worth
# configuring separately since build already failed 3x on the same issue by
# the time the resolver fires; re-running the same model is a weaker bet.
# [models.resolve]
# model = ""
# max_turns = 160

[plan]
# Context injection for the plan stage's prompt — both off by default (no
# behavior change from a bare plan.md template).
include_git_log = false       # prepend the last N `git log --oneline` lines
git_log_lines = 20
context_files = []            # e.g. ["docs/architecture.md"] — contents prepended
# "brief" selects prompts/plan-brief.md instead of plan.md, but only if that
# file actually exists in prompts_dir — harmless to set without adding it.
depth = "detailed"            # "detailed" | "brief"

[build]
# Shell command run once in the worktree before the build stage's first
# (non-resumed) agent call for a run — e.g. install deps, seed a DB. Empty =
# no-op (default).
pre_hook = ""
# False (default): a failing pre_hook is logged but doesn't block build —
# the failure surfaces later in whichever check actually needed it. True:
# fail the build stage immediately instead.
pre_hook_required = false

[evidence]
# "structured" asks the evidence prompt for a trailing fenced JSON block
# (pass_count, fail_count, coverage_pct, scope_summary) that the review stage
# parses deterministically instead of re-deriving it from prose. Default
# "prose" is today's behavior, unchanged.
output_format = "prose"       # "prose" | "structured"

[review]
enabled = true
runner = "cursor-sdk"         # legacy CLI runners remain valid
model = ""
approve_keywords = ["APPROVE"]
request_changes_keywords = ["REQUEST_CHANGES"]
escalate_keywords = ["ESCALATE"]
# Review is an investigation, not open-ended implementation — needs far
# fewer turns than build/evidence.
max_turns = 10
# Project-specific items appended to the review prompt that the reviewer
# must explicitly address, e.g. ["confirm no secrets committed"]. Empty =
# none (default). Scoped to the SPEC axis only when two_axis = true (spec
# conformance is where project-specific acceptance rules belong); applies to
# the single combined review when two_axis = false.
checklist = []
# Same idea as `checklist` above, but for the STANDARDS axis (two_axis = true
# only) — e.g. ["all public functions have docstrings", "no print() in
# production code"]. Empty = none (default). Has no effect when
# two_axis = false.
standards_checklist = []
# "line_start" requires the verdict keyword to be the first token of a line
# (allows markdown emphasis/heading/list prefixes), eliminating false
# ESCALATE/REQUEST_CHANGES matches from prose that merely mentions the word.
# Default "anywhere" is today's behavior, unchanged.
keyword_mode = "anywhere"      # "anywhere" | "line_start"
# Two-axis review (DEFAULT ON): runs Spec-conformance and Standards/quality as
# two SEPARATE, INDEPENDENT reviewer sessions in parallel (own prompt, own
# session key, own findings) instead of one merged verdict — a change can
# legitimately pass one axis and fail the other, and a single merged verdict
# hides that. Combined verdict: BOTH axes must APPROVE for review_approved;
# either REQUEST_CHANGES -> review_changes_requested (both axes' findings
# surfaced in review-comments.md); either ESCALATE -> review_escalated
# (escalation always wins). Cost/latency tradeoff: this is roughly 2x the LLM
# calls of single-axis review (two full agentic investigations instead of
# one) — deliberate, since this stage is the last human-out-of-the-loop gate
# before a PR ships. Set to false to restore the EXACT legacy single-verdict,
# single-session review behavior (uses review.md only, ignores
# standards_checklist, keeps the single "review" session key).
two_axis = true

[git]
base_branch = "main"          # diff base for scope guard + review
# auto_ship = true            # ship_run fires automatically on review_approved,
                               # no human `gantry ship` call required
# auto_merge = true           # (requires auto_ship) also squash-merge + delete
                               # the branch of the PR ship_run just opened
# auto_approve_docs = true    # spec_complete/design_complete auto-advance like a
                               # human `gantry approve` would — combined with
                               # auto_ship/auto_merge above, gives a fully
                               # hands-off spec-to-merged-PR run with zero human
                               # gates. Default false: spec/design pause for a
                               # human to read and `gantry approve`/`revise`.
ship_retry_attempts = 2        # cap on auto-retry attempts for ship_failed
                               # (only relevant when auto_ship = true) before
                               # the run is left for a human to inspect.

[scope]
# Gantry's built-in deterministic guard. Globs and path prefixes both work.
forbid_paths = [".env", "**/*.pem", "**/secrets/**"]
# "block" (default): a file outside the plan's declared scope fails checks,
# unless the build stage declared it under a "## Scope additions" section in
# build-summary.md (see the build prompt template) — the common case of a
# build legitimately discovering it needs an undeclared file then passes
# automatically. "warn": an undeclared file is recorded as a warning in
# scope.json but doesn't fail checks. "off": disables plan-scope enforcement
# entirely (forbid_paths still always applies).
mode = "block"                 # "block" | "warn" | "off"
# In "block"/"warn" mode, an undeclared new file only gets a free pass when
# require_declared_additions is False — with the default (True), an
# undeclared file is still flagged even in "warn" mode.
require_declared_additions = true
# Empty by default — project opt-in only, no project-agnostic guessing at
# what's "sensitive" for an arbitrary repo. Any changed file matching one of
# these globs forces a human-gated status (checks_high_risk_escalated)
# regardless of auto_approve_docs/auto_ship/auto_resolve — always requires an
# explicit `gantry approve`, never auto-advances.
# high_risk_paths = ["**/auth/**", "**/migrations/**"]

[checks]
# Delegate house rules to THIS repo's own toolchain. Gantry runs each command
# and gates on exit code. Works for any language: swap in ruff/go vet/etc.
# Each entry is a bare string (runs serially, in order) OR a table with its
# own timeout/parallel override:
#   commands = ["npm run lint", { command = "npm run build", timeout = 300 },
#               { command = "npm test", parallel = true }]
# parallel=true commands run concurrently with each other (bounded by
# max_parallel below); everything else stays serial, same as today.
commands = ["npm run lint", "npm run build"]
timeout = 900
max_parallel = 4               # cap on concurrently-running parallel=true commands
retry_checks = 3                # auto-resume build with failure feedback this many
                                 # times before escalating to a human (checks_escalated)
# If True, checks_escalated spawns a dedicated resolver agent instead of
# dead-ending at a human — opt-in, appropriate for a solo/local project
# willing to trade a human review gate for full unattended operation.
auto_resolve = false
resolve_attempts = 2             # cap on resolver-agent attempts before giving up
                                  # for real (resolve_escalated)
# 0 = disabled (default; today's exact behavior — a failing check fails
# immediately). When >0, a failing check command is re-run bare (no code
# changes, no agent call) up to this many additional times before falling
# into the agent-involved retry-with-feedback loop above. Any passing re-run
# marks the check as flaky (recorded, not escalated) instead of a real
# failure. Opt-in: not every check command is safe to blindly re-run.
flaky_retry_attempts = 0

[notify]
backend = "none"              # "none" | "telegram" | "webhook"
# telegram reads GANTRY_TELEGRAM_BOT_TOKEN / GANTRY_TELEGRAM_CHAT_ID from env
# webhook_url = "https://hooks.example.com/..."

[daemon]
# Wall-clock cap on how long the background `gantry daemon-tick` job (see
# `gantry daemon install`) spends on THIS target before moving on to the
# next registered target in the same tick. Keep comfortably under the
# daemon's own tick interval (default 60s) so one hung target can't eat
# every other project's turn.
per_target_timeout_seconds = 45

[skills]
# Agent skill libraries mandated for the BUILD and EVIDENCE stages only (execution
# discipline — TDD, systematic debugging, review rigor). Scoped so they augment
# rather than fight Gantry's own spec/design/plan stages. Empty = none mandated.
enabled = []                  # e.g. ["superpowers"]
# build and evidence get different framing even with the same skills list —
# build is EXECUTION, evidence is VERIFICATION. Leave unset for evidence's
# built-in verification-focused default; override here if you want different
# wording for your project.
evidence_directive = ""
# Per-runner install commands (clean, inspectable — no piped remote scripts).
# `gantry init --with-skills` runs the active runner's command; `gantry doctor` lists them.
# Defaults for "superpowers" are built in for claude-code, cursor-cli, and codex-cli;
# override or add more here:
# [skills.installers.superpowers]
# claude-code = "claude plugin install superpowers@claude-plugins-official"
# cursor-cli  = "npx skills add obra/superpowers -a cursor -y"
# codex-cli   = "npx skills add obra/superpowers -a codex -g -y"

[e2e]
# Deterministic, non-LLM e2e test step run between checks and the evidence
# stage — decouples slow/hanging test suites from the expensive evidence
# agent turn. Disabled by default (evidence stage falls back to running e2e
# itself via its own prompt template).
enabled = false
spec_glob = "tests/e2e/*.spec.ts"  # global default; per-app override below
timeout = 1800
# Per-app config: bare command string (no retry) or a table with retry/
# spec_glob overrides. Only apps whose files this run's diff actually
# touched (anywhere under apps/<name>/) get their e2e suite run.
# [e2e.apps]
# web = "npm run e2e"
# [e2e.apps.api]
# command = "npm run e2e:api"
# retry = 2                        # retry a failing run this many times
# spec_glob = "tests/e2e/api/*.spec.ts"  # overrides the global spec_glob above

[mcp]
# MCP servers Gantry registers with the active runner so the agent can call their
# tools during a stage. Two curated servers ship with built-in configs:
#   codebase-memory : structural code intelligence — architecture overview, call
#                     graph, git-diff impact + risk. Attached to plan/build/evidence/review.
#                     Install: https://github.com/DeusData/codebase-memory-mcp
#   chrome-devtools : live Chrome control for real E2E evidence (network, console,
#                     screenshots). Attached to evidence only. (npx, no install.)
# Enable per repo. Empty = none.
enabled = []                  # e.g. ["codebase-memory", "chrome-devtools"]
# Declare custom servers here:
# [mcp.servers.my-server]
# command = "my-mcp"
# args = ["serve"]
# stages = ["build", "evidence"]

[proxy]
# Per-runner LLM gateway/proxy overrides — for an org-internal gateway sitting
# in front of the vendor API. Independent of Docker's container env
# pass-through (see docker.py / GANTRY_DOCKER_PASS_ENV); works bare-metal too.
# Only claude-code and codex-cli are supported (cursor-cli has no verified
# base-url/headers override mechanism — a [proxy.cursor-cli] table here is
# ignored with a logged warning). Empty/absent = no override (default), each
# runner talks to its normal vendor endpoint with its normal ambient auth.
#
# [proxy.claude-code]
# base_url = "https://your-gateway.example.com"   # -> ANTHROPIC_BASE_URL
# api_key_env = "MY_ANTHROPIC_GATEWAY_TOKEN"        # env var NAME (not the literal
#                                                    # secret) read at invocation time
#                                                    # and passed through as
#                                                    # ANTHROPIC_AUTH_TOKEN
# # claude-code has no verified custom-headers mechanism — setting `headers`
# # here only logs a one-line warning, it is not sent anywhere.
# headers = {}
#
# [proxy.codex-cli]
# base_url = "https://your-gateway.example.com"     # -> model_providers.<id>.base_url
# api_key_env = "MY_OPENAI_GATEWAY_TOKEN"           # env var NAME read at invocation
#                                                    # time, passed through as codex's
#                                                    # own env_key-sourced auth
# # codex DOES support arbitrary headers, passed per-invocation as
# # `-c model_providers.<id>.http_headers.<key>=<value>` flags:
# headers = { "X-My-Header" = "value" }

[herdr]
# Optional integration with herdr (https://herdr.dev), a terminal multiplexer that
# understands agents. When you run Gantry INSIDE a herdr pane (HERDR_ENV=1), Gantry
# reports its semantic pipeline stage (e.g. evidence_running, review_approved) to
# the herdr sidebar. Fully auto-detected: no effect at all when not inside herdr,
# so this is safe to leave on for headless/CI/cron runs.
enabled = true
report_state = true           # push stage state to the herdr sidebar
