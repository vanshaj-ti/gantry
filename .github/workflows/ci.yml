name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:
    inputs:
      live_sdk_smoke:
        description: "Run credential-gated Cursor SDK live smoke"
        type: boolean
        default: false

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install ruff
      - run: ruff check .

  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package
        run: pip install -e . ruff coverage

      - name: Run tests with coverage
        run: |
          coverage run -m unittest discover -s tests -v
          coverage report --fail-under=68
          coverage report \
            --include='gantry/status.py' --fail-under=95
          coverage report \
            --include='gantry/advance.py,gantry/advance_dispatch.py,gantry/machine.py' --fail-under=80
          coverage report \
            --include='gantry/engine.py' --fail-under=85
          coverage xml -o coverage.xml

      - name: Upload coverage XML
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-py${{ matrix.python-version }}
          path: coverage.xml

  sdk-smoke:
    if: github.event_name == 'workflow_dispatch' && inputs.live_sdk_smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -e .
      - name: Live Cursor SDK smoke
        env:
          GANTRY_CURSOR_SDK_LIVE: "1"
          CURSOR_API_KEY: ${{ secrets.CURSOR_API_KEY }}
        run: python -m unittest tests.test_cursor_sdk_smoke.TestCursorSdkLiveSmoke -v
