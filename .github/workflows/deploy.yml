name: Deploy to GCP

# Fires only after CI (tests + lint) has actually passed on main — mirrors
# the manual discipline used all through this repo's GCP rollout ("confirm
# tests pass, then redeploy"), just automated. Deploying straight off
# `push` without waiting for CI would ship an untested commit to the VM.
on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]
  workflow_dispatch: {}   # manual retrigger for testing/recovery

permissions:
  id-token: write   # required for Workload Identity Federation
  contents: read

jobs:
  deploy:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.GCP_WIF_PROVIDER }}
          service_account: ${{ vars.GCP_CI_SERVICE_ACCOUNT }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Deploy to gantry-vm
        env:
          # Repo/org Actions variables — no project name is hardcoded here.
          TARGET_REPO_URL: ${{ vars.GANTRY_TARGET_REPO_URL }}
          GANTRY_REPO_URL: ${{ vars.GANTRY_REPO_URL }}
          BASE_BRANCH: ${{ vars.GANTRY_BASE_BRANCH || 'staging' }}
          GCP_ZONE: ${{ vars.GCP_ZONE || 'us-central1-a' }}
          GCP_VM_NAME: ${{ vars.GCP_VM_NAME || 'gantry-vm' }}
        run: |
          if [ -z "$TARGET_REPO_URL" ] || [ -z "$GANTRY_REPO_URL" ]; then
            echo "Set repo variables GANTRY_TARGET_REPO_URL and GANTRY_REPO_URL" >&2
            exit 1
          fi
          gcloud compute ssh "$GCP_VM_NAME" --zone="$GCP_ZONE" --tunnel-through-iap \
            --command="sudo bash -c '
              export TARGET_REPO_URL=${TARGET_REPO_URL}
              export GANTRY_REPO_URL=${GANTRY_REPO_URL}
              export BASE_BRANCH=${BASE_BRANCH}
              echo y | /opt/gantry-src/deploy/gcp/03-deploy.sh
            '"
