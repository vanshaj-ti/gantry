name: Deploy to GCP

# Fires only after CI (tests + lint) has actually passed on main — mirrors
# the manual discipline used all through this repo's GCP rollout ("confirm
# tests pass, then redeploy"), just automated. Deploying straight off
# `push` without waiting for CI would ship an untested commit to the VM.
on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]
  workflow_dispatch: {}   # manual retrigger for testing/recovery

permissions:
  id-token: write   # required for Workload Identity Federation
  contents: read

jobs:
  deploy:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.GCP_WIF_PROVIDER }}
          service_account: ${{ vars.GCP_CI_SERVICE_ACCOUNT }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Deploy to gantry-vm
        env:
          TARGET_REPO_URL: ${{ vars.GANTRY_TARGET_REPO_URL }}
          GANTRY_REPO_URL: ${{ vars.GANTRY_REPO_URL }}
          BASE_BRANCH: ${{ vars.GANTRY_BASE_BRANCH || 'staging' }}
          GCP_ZONE: ${{ vars.GCP_ZONE || 'us-central1-a' }}
          GCP_VM_NAME: ${{ vars.GCP_VM_NAME || 'gantry-vm' }}
        run: |
          set -euo pipefail
          if [ -z "${TARGET_REPO_URL}" ] || [ -z "${GANTRY_REPO_URL}" ]; then
            echo "Set repo variables GANTRY_TARGET_REPO_URL and GANTRY_REPO_URL" >&2
            exit 1
          fi
          # Write the remote script locally so quoting stays simple, then
          # pipe it through IAP SSH. Always refresh /opt/gantry-src first so
          # the VM runs this commit's 03-deploy.sh (not a stale checkout).
          cat > /tmp/gantry-remote-deploy.sh <<'REMOTE'
          set -euo pipefail
          : "${TARGET_REPO_URL:?}"
          : "${GANTRY_REPO_URL:?}"
          : "${BASE_BRANCH:=staging}"
          export TARGET_REPO_URL GANTRY_REPO_URL BASE_BRANCH
          # Back-compat for any leftover callers of the old env name.
          export EDUPAID_REPO_URL="${TARGET_REPO_URL}"
          export GANTRY_DEPLOY_YES=1
          GANTRY_SRC_DIR=/opt/gantry-src
          if [ -d "$GANTRY_SRC_DIR/.git" ]; then
            git -C "$GANTRY_SRC_DIR" remote set-url origin "$GANTRY_REPO_URL" || true
            git -C "$GANTRY_SRC_DIR" fetch --depth=1 origin main
            git -C "$GANTRY_SRC_DIR" checkout -f FETCH_HEAD
            git -C "$GANTRY_SRC_DIR" clean -fd
          else
            git clone --depth=1 --branch main "$GANTRY_REPO_URL" "$GANTRY_SRC_DIR"
          fi
          bash "$GANTRY_SRC_DIR/deploy/gcp/03-deploy.sh"
          REMOTE
          # Inject env into the remote shell before the script body.
          {
            printf 'export TARGET_REPO_URL=%q\n' "$TARGET_REPO_URL"
            printf 'export GANTRY_REPO_URL=%q\n' "$GANTRY_REPO_URL"
            printf 'export BASE_BRANCH=%q\n' "$BASE_BRANCH"
            cat /tmp/gantry-remote-deploy.sh
          } | gcloud compute ssh "$GCP_VM_NAME" \
                --zone="$GCP_ZONE" \
                --tunnel-through-iap \
                --command='sudo bash -s'
