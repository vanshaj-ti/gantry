name: Deploy to GCP

# Fires only after CI (tests + lint) has actually passed on main — mirrors
# the manual discipline used all through this repo's GCP rollout ("confirm
# tests pass, then redeploy"), just automated. Deploying straight off
# `push` without waiting for CI would ship an untested commit to the VM.
on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]

permissions:
  id-token: write   # required for Workload Identity Federation
  contents: read

jobs:
  deploy:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.GCP_WIF_PROVIDER }}
          service_account: ${{ vars.GCP_CI_SERVICE_ACCOUNT }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Deploy to gantry-vm
        run: |
          gcloud compute ssh gantry-vm --zone=us-central1-a --tunnel-through-iap \
            --command='sudo bash -c "
              export EDUPAID_REPO_URL=https://github.com/trilogy-group/edupaid.git
              export GANTRY_REPO_URL=https://github.com/vanshaj-ti/gantry.git
              echo y | /opt/gantry-src/deploy/gcp/03-deploy.sh
            "'
